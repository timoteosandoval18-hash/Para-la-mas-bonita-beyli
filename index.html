<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Para la niña de ojitos lindos</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: Arial, Helvetica, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            /* Fondo cremita con rosita leve */
            background: linear-gradient(135deg, #fff8f0, #ffeef8);
        }
        
        .container {
            display: flex;
            align-items: center;
            gap: 60px;
            padding: 50px;
            max-width: 1200px;
            margin: 20px;
        }
        
        .dibujo {
            max-width: 450px;
            width: 100%;
            height: auto;
            flex-shrink: 0;
            filter: drop-shadow(0 6px 20px rgba(0,0,0,0.15));
        }
        
        .texto {
            font-size: 42px;
            color: #d63384;
            text-align: left;
            line-height: 1.2;
            font-weight: 800;
        }
        
        /* Para celular */
        @media (max-width: 768px) {
            .container {
                flex-direction: row;
                gap: 25px;
                padding: 30px 20px;
            }
            .dibujo {
                max-width: 200px;
            }
            .texto {
                font-size: 24px;
                line-height: 1.1;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <img src="conejito.png" alt="Conejito con lirio" class="dibujo">
        
        <div class="texto">
            Para<br>
            La<br>
            Niña<br>
            De<br>
            Ojitos<br>
            Lindos,<br>
            La<br>
            Más<br>
            Hermosa<br>
            Del<br>
            Mundo💕
        </div>
    </div>
</body>
</html>
